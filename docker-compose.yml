services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app-backend
    restart: unless-stopped
    ports:
      - "6441:6441"
    environment:
      NODE_ENV: production
      PORT: 6441
    env_file:
      - ./backend/.env
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6441/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:6441}
    container_name: app-frontend
    restart: unless-stopped
    ports:
      - "6442:6442"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:6441}
    container_name: app-admin
    restart: unless-stopped
    ports:
      - "6443:6443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

  nginx:
    image: nginx:1.25-alpine
    container_name: app-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - type: bind
        source: ./nignx/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
    depends_on:
      - backend
      - frontend
      - admin
    networks:
      - app-net

networks:
  app-net:
    driver: bridge